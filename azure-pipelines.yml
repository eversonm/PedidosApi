# ============================================================
#  PedidosApi — Pipeline CI/CD com Environments
#  Alpha → Beta → RC → Stable
#
#  Triggers por tag SemVer:
#    v*.*.*-alpha.*  → CI + Deploy Alpha
#    v*.*.*-beta.*   → CI + Deploy Beta
#    v*.*.*-rc.*     → CI + Deploy RC (com aprovação manual)
#    v*.*.*          → CI + Deploy Stable (com aprovação manual)
#
#  Exemplos de tags:
#    git tag v1.1.0-alpha.1   → sobe para Alpha
#    git tag v1.1.0-beta.1    → sobe para Beta
#    git tag v1.1.0-rc.1      → sobe para RC  (aguarda aprovação)
#    git tag v1.1.0            → sobe para Stable (aguarda aprovação)
#
#  Environments no Azure DevOps:
#    Pipelines → Environments → New:
#      alpha   (sem aprovação — automático)
#      beta    (sem aprovação — automático)
#      rc      (aprovação: tech lead)
#      stable  (aprovação: tech lead + PM)
# ============================================================
trigger:
  branches:
    include:
      - main
      - 'feat/*'
      - 'fix/*'
  tags:
    include:
      - 'v*.*.*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.x'
  APP_NAME_ALPHA:  'pedidos-api-curso-devops-alpha'
  APP_NAME_BETA:   'pedidos-api-curso-devops-beta'
  APP_NAME_RC:     'pedidos-api-curso-devops-rc'
  APP_NAME_STABLE: 'pedidos-api-curso-devops'

stages:

# ── CI — roda em tudo ──────────────────────────────────────
- stage: CI
  displayName: 'CI — Build, Test e Artefato'
  jobs:
  - job: BuildAndTest
    displayName: 'Build, Test e Publicar'
    steps:

    - task: UseDotNet@2
      displayName: '1. Instalar .NET SDK $(dotnetVersion)'
      inputs:
        version: '$(dotnetVersion)'
        includePreviewVersions: true

    - script: |
        BRANCH="$(Build.SourceBranch)"
        if [[ "$BRANCH" == refs/tags/v* ]]; then
          VERSION="${BRANCH#refs/tags/v}"
        else
          VERSION="0.0.0-$(Build.BuildNumber)"
        fi
        echo "##vso[task.setvariable variable=appVersion]$VERSION"
        echo "Versão calculada: $VERSION"
      displayName: '2. Calcular versão SemVer'

    - task: DotNetCoreCLI@2
      displayName: '3. Restaurar pacotes NuGet'
      inputs:
        command: restore
        projects: '**/*.csproj'

    - task: DotNetCoreCLI@2
      displayName: '4. Build'
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: >
          --configuration $(buildConfiguration)
          --no-restore
          -p:Version=$(appVersion)

    - task: DotNetCoreCLI@2
      displayName: '5. Testes unitários'
      inputs:
        command: test
        projects: '**/*Tests*.csproj'
        arguments: >
          --configuration $(buildConfiguration)
          --no-build
          --collect:"XPlat Code Coverage"
        publishTestResults: true

    - task: DotNetCoreCLI@2
      displayName: '6. Publicar aplicação'
      inputs:
        command: publish
        projects: '**/*.csproj'
        arguments: >
          --configuration $(buildConfiguration)
          --output $(Build.ArtifactStagingDirectory)
        zipAfterPublish: true

    - task: PublishBuildArtifacts@1
      displayName: '7. Salvar artefato'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: drop
        publishLocation: 'Container'

# ── ALPHA — merge na main ──────────────────────────────────
- stage: DeployAlpha
  displayName: 'Alpha — Deploy automático'
  dependsOn: CI
  condition: >
    and(
      succeeded(),
      or(
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        contains(variables['Build.SourceBranch'], '-alpha.')
      )
    )
  jobs:
  - deployment: DeployAlpha
    displayName: 'Deploy Alpha'
    environment: 'alpha'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: '1. Baixar artefato'

          - task: AzureWebApp@1
            displayName: '2. Deploy Alpha'
            inputs:
              azureSubscription: 'sc-azure-pedidosapi'
              appType: 'webApp'
              appName: '$(APP_NAME_ALPHA)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'
              deploymentMethod: 'auto'

          - script: |
              sleep 20
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(APP_NAME_ALPHA)-hbdpfdc7dhgmbscv.brazilsouth-01.azurewebsites.net/pedidos)
              echo "Smoke test Alpha: $STATUS"
              [ "$STATUS" = "200" ] && echo "OK" || exit 1
            displayName: '3. Smoke test Alpha'

# ── BETA — tag v*-beta.* ───────────────────────────────────
- stage: DeployBeta
  displayName: 'Beta — Deploy automático'
  dependsOn: CI
  condition: >
    and(
      succeeded(),
      contains(variables['Build.SourceBranch'], '-beta.')
    )
  jobs:
  - deployment: DeployBeta
    displayName: 'Deploy Beta'
    environment: 'beta'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: '1. Baixar artefato'

          - task: AzureWebApp@1
            displayName: '2. Deploy Beta'
            inputs:
              azureSubscription: 'sc-azure-pedidosapi'
              appType: 'webApp'
              appName: '$(APP_NAME_BETA)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'
              deploymentMethod: 'auto'

          - script: |
              sleep 20
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(APP_NAME_BETA)-bbbgc9e8bsfafzf7.brazilsouth-01.azurewebsites.net/pedidos)
              echo "Smoke test Beta: $STATUS"
              [ "$STATUS" = "200" ] && echo "OK" || exit 1
            displayName: '3. Smoke test Beta'

# ── RC — tag v*-rc.* (aprovação: Tech Lead) ───────────────
- stage: DeployRC
  displayName: 'RC — Aprovação obrigatória'
  dependsOn: CI
  condition: >
    and(
      succeeded(),
      contains(variables['Build.SourceBranch'], '-rc.')
    )
  jobs:
  - deployment: DeployRC
    displayName: 'Deploy RC'
    environment: 'rc'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: '1. Baixar artefato'

          - task: AzureWebApp@1
            displayName: '2. Deploy RC'
            inputs:
              azureSubscription: 'sc-azure-pedidosapi'
              appType: 'webApp'
              appName: '$(APP_NAME_RC)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'
              deploymentMethod: 'auto'

          - script: |
              sleep 20
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(APP_NAME_RC)-a3gqd4ctgpbmb7gf.brazilsouth-01.azurewebsites.net/pedidos)
              echo "Smoke test RC: $STATUS"
              [ "$STATUS" = "200" ] && echo "OK" || exit 1
            displayName: '3. Smoke test RC'

# ── STABLE — tag v*.*.* sem sufixo (aprovação: TL + PM) ───
- stage: DeployStable
  displayName: 'Stable — Produção (aprovação dupla)'
  dependsOn: CI
  condition: >
    and(
      succeeded(),
      startsWith(variables['Build.SourceBranch'], 'refs/tags/v'),
      not(contains(variables['Build.SourceBranch'], '-alpha.')),
      not(contains(variables['Build.SourceBranch'], '-beta.')),
      not(contains(variables['Build.SourceBranch'], '-rc.'))
    )
  jobs:
  - deployment: DeployStable
    displayName: 'Deploy Stable'
    environment: 'stable'
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop
            displayName: '1. Baixar artefato'

          - task: AzureWebApp@1
            displayName: '2. Deploy Stable'
            inputs:
              azureSubscription: 'sc-azure-pedidosapi'
              appType: 'webApp'
              appName: '$(APP_NAME_STABLE)'
              package: '$(Pipeline.Workspace)/drop/**/*.zip'
              deploymentMethod: 'auto'

          - script: |
              sleep 25
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(APP_NAME_STABLE)-hdaebhgzbxdxajdw.brazilsouth-01.azurewebsites.net/pedidos)
              echo "Smoke test Stable: $STATUS"
              [ "$STATUS" = "200" ] && echo "OK — produção no ar!" || exit 1
            displayName: '3. Smoke test Stable'

          - script: |
              echo "================================================"
              echo " Deploy em produção concluído!"
              echo " Versão : $(Build.SourceBranchName)"
              echo " URL    : https://$(APP_NAME_STABLE)-hdaebhgzbxdxajdw.brazilsouth-01.azurewebsites.net"
              echo "================================================"
            displayName: '4. Resumo do deploy'