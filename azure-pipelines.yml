trigger:
  branches:
    include:
      - main
  tags:
    include:
      - "v*.*.*"

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"
  dotnetVersion: "10.x"
  appVersion: ${{ replace(variables['Build.SourceBranchName'], 'v', '') }}
  # Quando trigger é tag v1.1.0 → appVersion = "1.1.0"
  # O replace remove o "v" inicial para ficar no formato SemVer puro

stages:
  - stage: CI
    displayName: "CI"
    jobs:
      - job: BuildAndTest
        displayName: "Build, Test e Artefato"
        steps:
          - task: UseDotNet@2
            displayName: "1. Instalar .NET SDK $(dotnetVersion)"
            inputs:
              version: "$(dotnetVersion)"
              includePreviewVersions: true

          - task: DotNetCoreCLI@2
            displayName: "2. Restaurar pacotes NuGet"
            inputs:
              command: restore
              projects: "**/*.csproj"

          - task: DotNetCoreCLI@2
            displayName: "3. Build — versão $(appVersion)"
            inputs:
              command: build
              projects: "**/*.csproj"
              arguments: >
                --configuration $(buildConfiguration)
                --no-restore

          - task: DotNetCoreCLI@2
            displayName: "4. Testes unitários"
            inputs:
              command: test
              projects: "**/*Tests*.csproj"
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --collect:"XPlat Code Coverage"
              publishTestResults: true

          - script: |
              echo "================================================"
              echo " Versão do build : $(appVersion)"
              echo " Branch/Tag      : $(Build.SourceBranchName)"
              echo " Build número    : $(Build.BuildNumber)"
              echo "================================================"
            displayName: "5. Exibir versão SemVer"

          - task: DotNetCoreCLI@2
            displayName: "6. Publicar aplicação"
            inputs:
              command: publish
              projects: "**/*.csproj"
              arguments: >
                --configuration $(buildConfiguration)
                --output $(Build.ArtifactStagingDirectory)
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: "7. Salvar artefato no Azure Artifacts"
            inputs:
              pathToPublish: "$(Build.ArtifactStagingDirectory)"
              artifactName: drop
              publishLocation: "Container"

  # ──────────────────────────────────────────────────────────────
  # STAGE CD — Deploy no Azure App Service
  # Só executa em tag v*.*.* após CI verde
  # ──────────────────────────────────────────────────────────────
  - stage: CD
    displayName: "CD — Deploy Azure App Service"
    dependsOn: CI
    condition: >
      and(
        succeeded(),
        startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
      )

    jobs:
      # deployment (não job) habilita o uso de environments
      # e registra histórico de deploys no Azure DevOps
      - deployment: DeployProducao
        displayName: "Deploy no App Service"
        environment: "stable"

        strategy:
          runOnce:
            deploy:
              steps:
                # Baixa o artefato gerado pelo stage CI
                - download: current
                  artifact: drop
                  displayName: "1. Baixar artefato do CI"

                # Deploy no Azure App Service
                # azureSubscription: nome da Service Connection criada no pré-requisito 2
                # appName: nome do App Service criado no pré-requisito 1
                - task: AzureWebApp@1
                  displayName: "2. Deploy no App Service"
                  inputs:
                    azureSubscription: "sc-azure-pedidosapi"
                    appType: "webApp"
                    appName: "$(APP_NAME)"
                    package: "$(Pipeline.Workspace)/drop/**/*.zip"
                    deploymentMethod: "auto"

                # Aguarda o App Service reiniciar antes do smoke test
                # (necessário especialmente no Free Tier F1)
                - script: |
                    echo "Aguardando App Service reiniciar..."
                    sleep 20
                  displayName: "3. Aguardar reinicialização"

                # Smoke test: verifica se a API está respondendo
                - script: |
                    echo "================================================"
                    echo " Smoke Test — PedidosApi"
                    echo " URL: https://$(APP_NAME)-ggh7gchhcrcpghhs.chilecentral-01.azurewebsites.net"
                    echo "================================================"

                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                      https://$(APP_NAME)-ggh7gchhcrcpghhs.chilecentral-01.azurewebsites.net/pedidos)
                    echo "Status HTTP: $STATUS"

                    if [ "$STATUS" != "200" ]; then
                      echo "ERRO: API retornou status $STATUS — deploy com falha"
                      exit 1
                    fi

                    echo "Smoke test passou — API respondendo com 200 OK"
                  displayName: "4. Smoke test: GET /pedidos"

                # Resumo do deploy
                - script: |
                    echo "================================================"
                    echo " Deploy concluído com sucesso!"
                    echo " Versão  : $(Build.SourceBranchName)"
                    echo " Build   : $(Build.BuildNumber)"
                    echo " URL     : https://$(APP_NAME)-ggh7gchhcrcpghhs.chilecentral-01.azurewebsites.net"
                    echo "================================================"
                  displayName: "5. Resumo do deploy"
