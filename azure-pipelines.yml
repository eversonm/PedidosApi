trigger:
  branches:
    include:
      - main
  tags:
    include:
      - "v*.*.*"

pool:
  vmImage: "ubuntu-latest"

variables:
  buildConfiguration: "Release"
  dotnetVersion: "10.x"
  appName: "pedidosapi"
  appVersion: ${{ replace(variables['Build.SourceBranchName'], 'v', '') }}
  # Quando trigger é tag v1.1.0 → appVersion = "1.1.0"
  # O replace remove o "v" inicial para ficar no formato SemVer puro

stages:
  - stage: CI
    displayName: "CI"
    jobs:
      - job: BuildAndTest
        displayName: "Build, Test e Artefato"
        steps:
          - task: UseDotNet@2
            displayName: "1. Instalar .NET SDK $(dotnetVersion)"
            inputs:
              version: "$(dotnetVersion)"
              includePreviewVersions: true

          - task: DotNetCoreCLI@2
            displayName: "2. Restaurar pacotes NuGet"
            inputs:
              command: restore
              projects: "**/*.csproj"

          - task: DotNetCoreCLI@2
            displayName: "3. Build — versão $(appVersion)"
            inputs:
              command: build
              projects: "**/*.csproj"
              arguments: >
                --configuration $(buildConfiguration)
                --no-restore

          - task: DotNetCoreCLI@2
            displayName: "4. Testes unitários"
            inputs:
              command: test
              projects: "**/*Tests*.csproj"
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --collect:"XPlat Code Coverage"
              publishTestResults: true

          - script: |
              echo "================================================"
              echo " Versão do build : $(appVersion)"
              echo " Branch/Tag      : $(Build.SourceBranchName)"
              echo " Build número    : $(Build.BuildNumber)"
              echo "================================================"
            displayName: "5. Exibir versão SemVer"

          - task: DotNetCoreCLI@2
            displayName: "6. Publicar aplicação"
            inputs:
              command: publish
              projects: "**/*.csproj"
              arguments: >
                --configuration $(buildConfiguration)
                --output $(Build.ArtifactStagingDirectory)
              zipAfterPublish: true

          - task: PublishBuildArtifacts@1
            displayName: "7. Salvar artefato no Azure Artifacts"
            inputs:
              pathToPublish: "$(Build.ArtifactStagingDirectory)"
              artifactName: drop
              publishLocation: "Container"

  - stage: CD
    displayName: "CD"
    dependsOn: CI
    condition: >
      and(succeeded(),
      startsWith(variables['Build.SourceBranch'],
      'refs/tags/v'))
    jobs:
      - job: Deploy
        displayName: "Deploy no App Service"
        steps:
          - script: |
              echo "================================================"
              echo " Deploy versão : $(appVersion)"
              echo " Tag           : $(Build.SourceBranchName)"
              echo " Build         : $(Build.BuildNumber)"
              echo "================================================"
              echo "Deploy será configurado na Aula 4"
            displayName: "1. Resumo do deploy"
